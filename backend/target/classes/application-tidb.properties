spring.datasource.url=jdbc:mysql://${TIDB_HOST}:${TIDB_PORT}/${TIDB_DB_NAME}?useSSL=true&requireSSL=true
spring.datasource.username=${TIDB_USER}
spring.datasource.password=${TIDB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl-auto (update for dev, validate/none for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Optional: Connection pool settings optimized for TiDB
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
