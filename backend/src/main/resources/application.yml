server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/giftconcierge?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:ravi@123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  cache:
    type: redis
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:placeholder@gmail.com}
    password: ${SMTP_PASSWORD:placeholder_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: "bXlTdXBlclNlY3JldEtleUZvckdpZnRDb25jaWVyZ2VBcHBsaWNhdGlvbjIwMjZWZXJ5TG9uZ1NlY3JldA=="
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
    allowed-headers: "*"
    allow-credentials: true

logging:
  level:
    com.giftconcierge: DEBUG
    org.springframework.security: INFO

google:
  client:
    id: ${GOOGLE_CLIENT_ID:"939865483008-1i309tcldvfikuv4ieolvip9ipatebjj.apps.googleusercontent.com"}

